name: Urbanmud Daily Report

on:
  schedule:
    - cron: '30 18 * * *'   # 12:00 AM IST = 18:30 UTC every day
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Report start date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''
      to_date:
        description: 'Report end date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install firebase-admin nodemailer xlsx
        working-directory: scripts

      - name: Send daily report
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_USER:               ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO:                lagamanna@gmail.com,${{ secrets.GMAIL_USER }}
          REPORT_FROM_DATE:         ${{ github.event.inputs.from_date }}
          REPORT_TO_DATE:           ${{ github.event.inputs.to_date }}
        run: node daily-report.js
        working-directory: scripts
